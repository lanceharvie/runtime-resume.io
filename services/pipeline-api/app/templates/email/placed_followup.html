<!DOCTYPE html>
<html lang="en">
  <body style="margin:0;padding:24px;font-family:Arial,sans-serif;background:#edf5ee;color:#132117;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;margin:0 auto;background:#fbfefa;border:1px solid #d3e5d5;">
      <tr><td style="padding:32px;">
        <h1 style="margin:0 0 16px;font-size:28px;">{{ heading }}</h1>
        <p style="margin:0 0 16px;font-size:16px;">Hi {{ customer_name }}, if someone in your network needs RunTime Resume help, you can share your referral link.</p>
        <p style="margin:0 0 10px;font-size:15px;"><strong>Referral code:</strong> {{ referral_code }}</p>
        <p style="margin:0;word-break:break-all;font-size:15px;">{{ referral_link }}</p>
      </td></tr>
    </table>
  </body>
</html>
