<!DOCTYPE html>
<html lang="en">
  <body style="font-family: Arial, sans-serif; line-height: 1.6; color: #1f1f1f;">
    <div style="max-width: 640px; margin: 0 auto;">
      <h1>{{ heading }}</h1>
      <p>Hello {{ candidate_name }},</p>
      <p>Your RunTime Resume dashboard link is ready.</p>
      <p>
        <a href="{{ magic_link }}" style="display:inline-block;background:#c0392b;color:#ffffff;text-decoration:none;padding:12px 18px;">
          Open dashboard
        </a>
      </p>
      <p>This link expires at {{ expires_at }} UTC.</p>
      <p>If you did not request this link, you can ignore this email.</p>
    </div>
  </body>
</html>
